<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>GithubUserFinder</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="topbar">
            <form id="searchForm">
                <input type="text" id="input" placeholder="SEARCH A GITHUB USERNAME">
                <button id="search" type="submit">SUBMIT</button>
            </form>
        </div>
        <div id="content">
            <div id="profileCard"></div>
            <div id="profileData">
                <div id="gitStats"></div>
            </div>
        </div>

        <script src="config.js"></script>
        <script src="script.js"></script>
    </body>
</html>
